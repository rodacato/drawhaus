service: drawhaus-backend

image: ghcr.io/rodacato/drawhaus-backend

servers:
  web:
    hosts:
      - <%= ENV["HOST_IP"] %>

proxy:
  ssl: false
  host: drawhaus-api.notdefined.dev
  app_port: 4000
  healthcheck:
    interval: 10
    path: /health
    timeout: 5

registry:
  server: ghcr.io
  username: rodacato
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  context: backend/
  dockerfile: backend/Dockerfile
  target: production
  arch: amd64
  cache:
    type: gha

env:
  clear:
    PORT: 4000
    NODE_ENV: production
    FILES_PATH: /data/files
  secret:
    - DATABASE_URL
    - SESSION_SECRET
    - FRONTEND_URL
    - COOKIE_DOMAIN
    - HONEYBADGER_API_KEY
    - RESEND_API_KEY
    - FROM_EMAIL

volumes:
  - drawhaus-uploads:/data/files

logging:
  driver: json-file
  options:
    max-size: 50m
    max-file: "3"

accessories:
  postgres:
    image: postgres:16-alpine
    host: <%= ENV["HOST_IP"] %>
    env:
      clear:
        POSTGRES_USER: drawhaus
        POSTGRES_DB: drawhaus_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - drawhaus-pgdata:/var/lib/postgresql/data

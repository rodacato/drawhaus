service: drawhaus-backend

image: ghcr.io/rodacato/drawhaus-backend

ssh:
  user: deploy

servers:
  web:
    hosts:
      - <%= ENV["HOST_IP"] %>

proxy:
  ssl: false
  host: drawhaus-api.notdefined.dev
  app_port: 4000
  healthcheck:
    interval: 10
    path: /health
    timeout: 5

registry:
  server: ghcr.io
  username: rodacato
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  context: .
  dockerfile: apps/backend/Dockerfile
  target: production
  arch: amd64
  cache:
    type: gha

env:
  clear:
    PORT: 4000
    NODE_ENV: production
    FILES_PATH: /data/files
  secret:
    - COOKIE_DOMAIN
    - DATABASE_URL
    - ENCRYPTION_KEY
    - FROM_EMAIL
    - FRONTEND_URL
    - GH_CLIENT_ID
    - GH_CLIENT_SECRET
    - GH_REDIRECT_URI
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - GOOGLE_REDIRECT_URI
    - HONEYBADGER_API_KEY
    - REDIS_URL
    - RESEND_API_KEY
    - SESSION_SECRET

volumes:
  - drawhaus-uploads:/data/files
  - drawhaus-backups:/data/backups

logging:
  driver: json-file
  options:
    max-size: 50m
    max-file: "3"

accessories:
  postgres:
    image: postgres:16-alpine
    host: <%= ENV["HOST_IP"] %>
    env:
      clear:
        POSTGRES_USER: drawhaus
        POSTGRES_DB: drawhaus_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - drawhaus-pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    host: <%= ENV["HOST_IP"] %>
    port: "127.0.0.1:6379:6379"
    cmd: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    directories:
      - drawhaus-redis-data:/data

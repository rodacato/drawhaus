services:
  frontend:
    build:
      context: ./frontend
      target: dev
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3300:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4300
      NEXT_PUBLIC_WS_URL: http://localhost:4300
    command: npm run dev

  backend:
    build:
      context: ./backend
      target: dev
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    ports:
      - "4300:4000"
    environment:
      PORT: 4000
      FRONTEND_URL: http://localhost:3300
      DATABASE_URL: postgres://drawhaus:drawhaus@db:5432/drawhaus
    command: npm run dev

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: drawhaus
      POSTGRES_USER: drawhaus
      POSTGRES_PASSWORD: drawhaus
    ports:
      - "5643:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawhaus -d drawhaus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4300}
      VITE_WS_URL: ${VITE_WS_URL:-http://localhost:4300}
      VITE_GOOGLE_API_KEY: ${VITE_GOOGLE_API_KEY:-}
    command: npm run dev

  backend:
    build:
      context: ./backend
      target: dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    ports:
      - "4300:4000"
    environment:
      PORT: ${PORT:-4000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: ${DATABASE_URL:-postgres://drawhaus:drawhaus@db:5432/drawhaus}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      HONEYBADGER_API_KEY: ${HONEYBADGER_API_KEY:-}
    command: npm run dev

  redis:
    image: redis:7-alpine
    ports:
      - "6479:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drawhaus}
      POSTGRES_USER: ${POSTGRES_USER:-drawhaus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drawhaus}
    ports:
      - "5643:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawhaus -d drawhaus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

name: Deploy

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/drawhaus-backend:latest
            ghcr.io/${{ github.repository_owner }}/drawhaus-backend:${{ github.sha }}
          build-args: GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy backend
    needs: build
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      HOST_IP: ${{ secrets.HOST_IP }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      HONEYBADGER_API_KEY: ${{ secrets.HONEYBADGER_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Kamal
        run: gem install kamal

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Boot accessories (if not running)
        run: kamal accessory boot all -c config/deploy.backend.yml 2>/dev/null || true

      - name: Deploy with Kamal
        run: kamal deploy -c config/deploy.backend.yml

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/drawhaus-frontend:latest
            ghcr.io/${{ github.repository_owner }}/drawhaus-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_WS_URL=${{ vars.VITE_WS_URL }}
            VITE_GOOGLE_API_KEY=${{ vars.VITE_GOOGLE_API_KEY }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-frontend:
    name: Deploy frontend
    needs: [deploy, build-frontend]
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      HOST_IP: ${{ secrets.HOST_IP }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_WS_URL: ${{ vars.VITE_WS_URL }}
      VITE_GOOGLE_API_KEY: ${{ vars.VITE_GOOGLE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Kamal
        run: gem install kamal

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy frontend with Kamal
        run: kamal deploy -c config/deploy.frontend.yml
